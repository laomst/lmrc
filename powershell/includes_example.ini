# 额外脚本加载配置（示例文件）
#
# 此配置与机器环境相关，可根据不同机器单独配置
# 使用方式：复制此文件为 includes.ini 并按需修改
#   Copy-Item includes_example.ini includes.ini
#
# 格式说明：
#   - 每行一个脚本路径，# 开头为注释，空行会被忽略
#   - 仅支持绝对路径（以盘符 C:\、UNC 路径 \\、~ 或 $ 开头）
#   - 支持 ~ 展开为 $HOME
#   - 不存在的文件会被静默跳过

# 在 exports.ps1 之前加载（最早加载，用于定义基础变量）
[pre_export]

# 在 exports.ps1 之后加载（可以使用 exports 中定义的变量）
[post_export]

# path.ps1 前后
[pre_path]
[post_path]

# function.ps1 前后
[pre_function]
[post_function]

# alias.ps1 前后
[pre_alias]
[post_alias]

# completion.ps1 前后
[pre_completion]
[post_completion]

# prompt.ps1 前后
[pre_prompt]
[post_prompt]

# 其他配置文件加载前后
[pre_others]
[post_others]

# 所有配置加载完成后（最后的自定义扩展）
[post_all]
